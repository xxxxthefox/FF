<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر التطبيقات المعدلة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #2563eb; --bg: #f8fafc; --card-bg: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { background-color: var(--bg); color: #1e293b; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }

        /* الهيدر والبحث */
        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 1.8rem; color: #0f172a; margin-bottom: 20px; }
        
        .search-box { 
            width: 100%; max-width: 600px; padding: 15px 25px; 
            border-radius: 50px; border: 2px solid #e2e8f0; 
            outline: none; font-size: 1rem; transition: 0.3s;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .search-box:focus { border-color: var(--main); box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }

        /* شبكة العرض */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
        }

        .app-card { 
            background: var(--card-bg); border-radius: 20px; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px;
            border: 1px solid #e2e8f0; transition: 0.3s; position: relative;
        }
        .app-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }

        .app-header { display: flex; gap: 15px; align-items: center; }
        .app-img { width: 70px; height: 70px; border-radius: 15px; object-fit: cover; background: #f1f5f9; }
        
        .app-info { flex: 1; }
        .app-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 5px; color: #0f172a; }
        .app-meta { display: flex; gap: 10px; flex-wrap: wrap; }
        .badge { font-size: 0.75rem; padding: 3px 10px; border-radius: 6px; background: #f1f5f9; color: #64748b; font-weight: 600; }

        .app-details { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            padding-top: 15px; border-top: 1px solid #f1f5f9;
        }
        .detail-item { font-size: 0.85rem; color: #64748b; }
        .detail-item i { color: var(--main); margin-left: 5px; width: 15px; }

        .download-btn { 
            width: 100%; background: var(--main); color: #fff; border: none; 
            padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s;
        }
        .download-btn:hover { opacity: 0.9; }

        /* التنقل */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 50px 0; }
        .nav-btn { background: #0f172a; color: #fff; border: none; padding: 10px 25px; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .nav-btn:disabled { background: #cbd5e1; cursor: not-allowed; }

        footer { text-align: center; padding: 40px; color: #94a3b8; border-top: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>متجر تطبيقات معدلة</h1>
        <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن أي تطبيق أو لعبة بالاسم...">
    </header>

    <div class="grid" id="appGrid">
        </div>

    <div class="pagination">
        <button class="nav-btn" id="prevBtn">السابق</button>
        <span id="pageInfo">صفحة 1 / 36</span>
        <button class="nav-btn" id="nextBtn">التالي</button>
    </div>
</div>

<footer>
    تطوير وصيانة: <strong>xxxxxthefox</strong> &copy; 2026
</footer>

<script>
    const API_BASE = 'https://mod-hack.vercel.app/?n=';
    const DL_BASE = 'https://mod-hack-id.vercel.app/?id=';
    let currentData = [];
    let currentPage = 1;

    async function fetchData(page) {
        const grid = document.getElementById('appGrid');
        grid.innerHTML = '<div style="grid-column:1/-1; text-align:center;">جاري جلب قائمة التطبيقات...</div>';
        
        try {
            const res = await fetch(API_BASE + page);
            currentData = await res.json();
            render();
        } catch (e) {
            grid.innerHTML = '<div style="color:red; text-align:center;">فشل الاتصال، يرجى المحاولة لاحقاً</div>';
        }
    }

    function render(filter = '') {
        const grid = document.getElementById('appGrid');
        const query = filter.toLowerCase();

        // تصفية البيانات بناءً على البحث فقط (تم حذف الأقسام)
        let filtered = currentData.filter(app => app.name.toLowerCase().includes(query));

        if (filtered.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center;">لا يوجد نتائج لهذا البحث</div>';
            return;
        }

        grid.innerHTML = filtered.map(app => `
            <div class="app-card">
                <div class="app-header">
                    <img src="${app.image_url}" class="app-img" onerror="this.src='https://ui-avatars.com/api/?name=App'">
                    <div class="app-info">
                        <div class="app-name">${app.name}</div>
                        <div class="app-meta">
                            <span class="badge">${app.status || 'محدث'}</span>
                            <span class="badge">${app.mod_type || 'Premium'}</span>
                        </div>
                    </div>
                </div>
                
                <div class="app-details">
                    <div class="detail-item"><i class="fas fa-hdd"></i> الحجم: ${app.size || 'متغير'}</div>
                    <div class="detail-item"><i class="fas fa-code-branch"></i> الإصدار: ${app.version || '1.0'}</div>
                </div>

                <button class="download-btn" onclick="handleDownload('${app.id}')">
                    <i class="fas fa-download"></i> تحميل مباشر
                </button>
            </div>
        `).join('');

        document.getElementById('pageInfo').innerText = `صفحة ${currentPage} / 36`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
    }

    async function handleDownload(id) {
        try {
            const res = await fetch(DL_BASE + id);
            const data = await res.json();
            if (data.link) window.open(data.link, '_blank');
            else alert('عذراً، الرابط غير متوفر حالياً');
        } catch (e) {
            alert('خطأ في جلب رابط التحميل');
        }
    }

    // البحث اللحظي
    document.getElementById('searchInput').oninput = (e) => render(e.target.value);

    // أزرار التنقل
    document.getElementById('nextBtn').onclick = () => { currentPage++; fetchData(currentPage); window.scrollTo(0,0); };
    document.getElementById('prevBtn').onclick = () => { if(currentPage > 1) { currentPage--; fetchData(currentPage); window.scrollTo(0,0); } };

    // التحميل الأول
    fetchData(1);
</script>

</body>
</html>
